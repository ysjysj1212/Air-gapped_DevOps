name: Create Pull Request

on:
  workflow_run:
    workflows:
      - DevOps Policy
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  create:
    name: Create PR after successful branch validation
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Create pull request when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          case "$HEAD_BRANCH" in
            main|master)
              exit 0
              ;;
            DevOps/*|AI/*)
              ;;
            *)
              echo "Skipping branch without an allowed owner prefix: $HEAD_BRANCH"
              exit 0
              ;;
          esac

          work_item="${HEAD_BRANCH#*/}"
          if [ -z "$work_item" ] || printf '%s\n' "$work_item" | grep -Eq '[[:space:]/]'; then
            echo "Skipping branch with invalid work item segment: $HEAD_BRANCH"
            exit 0
          fi

          existing_pr="$(gh pr list \
            --repo "$REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            echo "Pull request already exists: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --repo "$REPOSITORY" \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "Auto PR: $HEAD_BRANCH" \
            --body "Created automatically after DevOps Policy passed for \`$HEAD_BRANCH\`."
