name: CI

on:
  push:
    branches: 
      - main
      - DevOps/*
      - AI/*
  pull_request:
    branches:
      - main
      - DevOps/*
      - AI/*

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r DevOps/requirements.txt

      - name: Verify dependencies
        run: |
          cd DevOps && pip check

      - name: Run YAML linting
        run: |
          cd DevOps && yamllint .

      - name: Run pytest
        run: |
          cd DevOps && pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: |
          cd DevOps && pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./DevOps/coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint

      - name: Run Black formatter check
        run: |
          black --check DevOps/src DevOps/tests || true

      - name: Run isort import check
        run: |
          isort --check-only DevOps/src DevOps/tests || true

      - name: Run Flake8
        run: |
          flake8 DevOps/src DevOps/tests --max-line-length=100 || true

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./DevOps
          file: ./DevOps/docker/Dockerfile
          push: false
          tags: air-gapped-devops:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker health check
        run: |
          docker run -d --rm --name ci-app -p 15000:5000 air-gapped-devops:${{ github.sha }}
          trap 'docker stop ci-app >/dev/null 2>&1 || true' EXIT
          sleep 10
          curl --fail http://127.0.0.1:15000/health

      - name: Build validator image
        run: |
          docker build -f DevOps/docker/Dockerfile.validator -t air-gapped-devops-validator:${{ github.sha }} DevOps

      - name: Run validator image
        run: |
          docker run --rm air-gapped-devops-validator:${{ github.sha }}
