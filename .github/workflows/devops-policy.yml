name: DevOps Policy

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
      - devops
      - feat/setup-project-structure

permissions:
  contents: read

jobs:
  validate:
    name: Validate dependencies, tests, YAML, and commits
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevOps1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: DevOps1/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check dependency conflicts
        run: pip check

      - name: Run tests
        run: pytest tests/

      - name: Lint YAML files
        run: yamllint .

      - name: Validate commit convention
        working-directory: .
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          pattern='^(feat|fix|docs|style|refactor|test|chore)(\([a-z0-9._-]+\))?: .{1,72}$'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          else
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              if git show-ref --verify --quiet refs/remotes/origin/main; then
                base_branch="origin/main"
              elif git show-ref --verify --quiet refs/remotes/origin/master; then
                base_branch="origin/master"
              else
                base_branch="origin/HEAD"
              fi
              base="$(git merge-base "$base_branch" "$HEAD_SHA")"
              range="${base}..${HEAD_SHA}"
            else
              range="${BASE_SHA}..${HEAD_SHA}"
            fi
          fi

          invalid_messages=""
          while IFS= read -r subject; do
            if ! printf '%s\n' "$subject" | grep -Eq "$pattern"; then
              invalid_messages="${invalid_messages}${subject}\n"
            fi
          done < <(git log --format=%s "$range")

          if [ -n "$invalid_messages" ]; then
            printf 'Invalid commit messages:\n%b\n' "$invalid_messages"
            printf 'Use: type(scope): subject\n'
            printf 'Allowed types: feat, fix, docs, style, refactor, test, chore\n'
            exit 1
          fi
