name: Auto Merge

on:
  workflow_run:
    workflows:
      - DevOps Policy
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge approved automation candidates
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Find pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pullRequests = context.payload.workflow_run.pull_requests;

            if (!pullRequests.length) {
              core.setOutput('number', '');
              return;
            }

            const prNumber = pullRequests[0].number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const allowedBaseBranches = [
              'main',
              'master',
              'devops',
              context.payload.repository.default_branch,
            ];
            const allowedHeadPattern = /^(DevOps|AI|feature)\/[^\s/]+$/;

            if (!allowedBaseBranches.includes(pullRequest.base.ref)) {
              core.setOutput('number', '');
              return;
            }

            if (pullRequest.head.repo.full_name !== `${owner}/${repo}`) {
              core.setOutput('number', '');
              return;
            }

            if (!allowedHeadPattern.test(pullRequest.head.ref)) {
              core.setOutput('number', '');
              return;
            }

            if (pullRequest.draft) {
              core.setOutput('number', '');
              return;
            }

            core.setOutput('number', String(prNumber));

      - name: Enable auto-merge and delete branch
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch
