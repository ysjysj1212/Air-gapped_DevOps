stages:
  - validate
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - node_modules/
    - .npm/

# Validate stage - 기본 검증
validate_node_version:
  stage: validate
  image: node:${NODE_VERSION}
  script:
    - node --version
    - npm --version
  only:
    - merge_requests
    - main

lint:
  stage: validate
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --cache .npm
  script:
    - npm run lint || echo "Linting skipped"
  allow_failure: true
  only:
    - merge_requests

# Test stage - 테스트 실행
test_unit:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --cache .npm
  script:
    - npm test
  coverage: '/Coverage: \d+\.\d+%/'
  artifacts:
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  allow_failure: false
  only:
    - merge_requests
    - main

# Build stage - 빌드
build:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --cache .npm
  script:
    - npm run build || echo "No build script"
  artifacts:
    paths:
      - dist/
      - build/
    expire_in: 1 day
  only:
    - main
    - tags

# Deploy stage - 배포 (선택)
deploy_staging:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --cache .npm
  script:
    - echo "Deploying to staging..."
    - npm run build
    - echo "Deployment complete"
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --cache .npm
  script:
    - echo "Deploying to production..."
    - npm run build
    - echo "Deployment complete"
  environment:
    name: production
    url: https://example.com
  only:
    - tags
  when: manual
