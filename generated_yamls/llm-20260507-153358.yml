stages:
  - build
  - test

image: node:20

before_script:
  - node --version

build:
  stage: build
  script:
    - if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then npm ci; elif [ -f package.json ]; then npm install; else echo "No package.json found"; fi
    - if [ -f package.json ]; then npm run build || echo "No build script configured"; else echo "Skipping build"; fi

test:
  stage: test
  script:
    - if [ -f package.json ]; then npm test || echo "No test script configured"; else echo "Skipping tests"; fi

