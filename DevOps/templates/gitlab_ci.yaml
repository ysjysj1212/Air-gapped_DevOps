stages:
  - build
  - test

image: python:3.10

before_script:
  - python --version

build:
  stage: build
  script:
    - python -m pip install --upgrade pip
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - python -m compileall . || true

test:
  stage: test
  script:
    - pytest || echo "No tests configured"
