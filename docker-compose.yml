---
services:
  # Flask CI/CD Pipeline Generator API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      GITLAB_URL: ${GITLAB_URL:-http://gitlab:80}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - gitlab
    networks:
      - air-gapped-network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health")
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Optional: Ollama LLM service with Gemma4 pre-installed (--profile ollama)
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    image: poc-ollama-with-gemma4:latest
    container_name: poc-ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_LOAD_TIMEOUT=10m
      - OLLAMA_NUM_PARALLEL=1
    networks:
      - air-gapped-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # GitLab CE (CI/CD System)
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: poc-gitlab
    hostname: gitlab.local
    restart: unless-stopped
    shm_size: "256m"
    ports:
      - "8080:80"
      - "2222:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    networks:
      - air-gapped-network

  # GitLab Runner (CI/CD Executor)
  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    container_name: poc-gitlab-runner
    restart: unless-stopped
    depends_on:
      - gitlab
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - air-gapped-network

networks:
  air-gapped-network:
    driver: bridge

volumes:
  ollama_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:
